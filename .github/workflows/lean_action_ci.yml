name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Check root imports and comparator modules
        run: |
          ./scripts/check_root_imports.sh
          ./scripts/check_challenge_development.sh
